    <script type="module">
        // Grammar diff annotation (JS tooltip — not CSS ::after, avoids overflow clipping)
        window.ocAnnotateGrammar = function(origEl, corrEl, changes) {
            if (!changes || !changes.length) return;

            function escHtml(s) {
                return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }

            function buildHtml(text, segs, cls) {
                var used = text.split('');
                var marks = [];
                segs.forEach(function(s, idx) {
                    if (!s) return;
                    var pos = text.indexOf(s, 0);
                    // Find first unmasked occurrence
                    var searchFrom = 0;
                    while (searchFrom < text.length) {
                        var p = text.indexOf(s, searchFrom);
                        if (p < 0) break;
                        // Check not masked
                        var masked = false;
                        for (var i = p; i < p + s.length; i++) { if (used[i] === '\x00') { masked = true; break; } }
                        if (!masked) {
                            marks.push({pos: p, len: s.length, idx: idx});
                            for (var j = p; j < p + s.length; j++) used[j] = '\x00';
                            break;
                        }
                        searchFrom = p + 1;
                    }
                });
                marks.sort(function(a,b){ return a.pos - b.pos; });
                var html = ''; var cursor = 0;
                marks.forEach(function(m) {
                    if (m.pos > cursor) html += escHtml(text.substring(cursor, m.pos));
                    var seg = text.substring(m.pos, m.pos + m.len);
                    var tip = (changes[m.idx] && changes[m.idx].explanation) ? escHtml(changes[m.idx].explanation) : '';
                    html += '<mark class="'+cls+'" data-tip="'+tip+'">'+escHtml(seg)+'</mark>';
                    cursor = m.pos + m.len;
                });
                if (cursor < text.length) html += escHtml(text.substring(cursor));
                return html;
            }

            var origSegs = changes.map(function(c){ return c.original; });
            var corrSegs = changes.map(function(c){ return c.corrected; });
            origEl.innerHTML = buildHtml(origEl.textContent, origSegs, 'oc-diff-err');
            corrEl.innerHTML = buildHtml(corrEl.textContent, corrSegs, 'oc-diff-fix');

            // Attach JS tooltips (fixed-position, not clipped by any parent overflow)
            var activeTip = null;
            origEl.querySelectorAll('.oc-diff-err[data-tip]').forEach(function(mark) {
                mark.addEventListener('mouseenter', function(e) {
                    var tip = mark.getAttribute('data-tip');
                    if (!tip) return;
                    if (activeTip) activeTip.remove();
                    var dark = document.documentElement.getAttribute('data-theme') !== 'light';
                    activeTip = document.createElement('div');
                    activeTip.style.cssText = 'position:fixed;z-index:600;background:'+(dark?'#1e1e1e':'#fff')+';color:'+(dark?'#ececec':'#111827')+';border:1px solid '+(dark?'#3f3f3f':'#c5cdd8')+';padding:8px 12px;border-radius:10px;font-size:0.8rem;line-height:1.5;max-width:300px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.35);white-space:normal;';
                    activeTip.textContent = tip;
                    document.body.appendChild(activeTip);
                    var rect = mark.getBoundingClientRect();
                    var tw = activeTip.offsetWidth, th = activeTip.offsetHeight;
                    var left = Math.max(8, Math.min(rect.left, window.innerWidth - tw - 8));
                    var top = rect.top - th - 8;
                    if (top < 8) top = rect.bottom + 8;
                    activeTip.style.left = left + 'px';
                    activeTip.style.top = top + 'px';
                });
                mark.addEventListener('mouseleave', function() {
                    if (activeTip) { activeTip.remove(); activeTip = null; }
                });
            });
        };

        // MutationObserver: detect grammar diff view and annotate it
        (function() {
            function runGrammarAnnotation() {
                var view = document.getElementById('oc-grammar-view');
                if (!view || view.dataset.annotated) return;
                var origEl = document.getElementById('oc-gr-orig');
                var corrEl = document.getElementById('oc-gr-corr');
                if (!origEl || !corrEl) return;
                view.dataset.annotated = '1';
                var raw = sessionStorage.getItem('oc-grammar-results');
                if (!raw) return;
                var changes;

                                        var item=ocMentionItems.find(function(i){return i._id===chipId;});
                                        if(item&&d.content){item.kind='content';item.text=d.content;}
                                        else if(item&&d.error){ocRemoveMentionChip(null,chipId);alert('Error fetching URL: '+(d.message||d.error));}
                                    }).catch(function(){ocRemoveMentionChip(null,chipId);alert('Failed to fetch URL.');});
                            }
                        });
                        textarea.focus();
                    } else if (opt.key === 'curl') {
                        menu.remove(); document.removeEventListener('keydown', keyHandler);
                        var vc=textarea.value, pc=textarea.selectionStart;
                        var aic=vc.lastIndexOf('@',pc-1);
                        if(aic>=0){textarea.value=vc.substring(0,aic)+vc.substring(pc);textarea.selectionStart=textarea.selectionEnd=aic;}
                        ocShowInputPopup({
                            title:'\uD83D\uDD17 cURL Request',
                            label:'Paste your curl command — the server will execute it and include the response:',
                            placeholder:"curl --location 'https://api.example.com/endpoint' \\\n  --header 'Authorization: Bearer token' \\\n  --header 'Content-Type: application/json' \\\n  --data '{\"key\": \"value\"}'",
                            btnLabel:'Execute & Add',
                            multiline: true,
                            onConfirm: function(val) {
                                var chipId='mc-'+Date.now();
                                var short=val.substring(0,50).replace(/\n/g,' ')+(val.length>50?'...':'');
                                ocAddMentionChip('\uD83D\uDD17', short, {kind:'loading',id:chipId});
                                fetch('executeCurl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:val})})
                                    .then(function(r){return r.json();})
                                    .then(function(d){
                                        var item=ocMentionItems.find(function(i){return i._id===chipId;});
                                        if(item&&d.content){item.kind='content';item.text=d.content;}
                                        else if(item&&d.error){ocRemoveMentionChip(null,chipId);alert('cURL error: '+(d.message||d.error));}
                                    }).catch(function(){ocRemoveMentionChip(null,chipId);alert('Failed to execute curl.');});
                            }
                        });
                        textarea.focus();
                    } else {
                        ocShowAtSubForm(opt.key, textarea, menu, bg, bd, tx, tx2);
                    }
                }; })(o);

                rows.push(row);
                menu.appendChild(row);
            });

            // Keyboard navigation: arrows select, Enter confirms, Escape closes
            var selIdx = 0;
            function highlight(i) {
                rows.forEach(function(r,j){ r.style.background = j===i ? hv : 'transparent'; });
                selIdx = i;
            }
            highlight(0);
            function keyHandler(e) {
                if (!document.body.contains(menu)) { document.removeEventListener('keydown', keyHandler); return; }
                if (e.key === 'ArrowDown') { e.preventDefault(); highlight((selIdx+1) % rows.length); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); highlight((selIdx+rows.length-1) % rows.length); }
                else if (e.key === 'Enter') { e.preventDefault(); document.removeEventListener('keydown', keyHandler); rows[selIdx].click(); }
                else if (e.key === 'Escape') { e.preventDefault(); document.removeEventListener('keydown', keyHandler); menu.remove(); textarea.focus(); }
            }
            document.addEventListener('keydown', keyHandler);

            // Close on outside click
            setTimeout(function() {
                document.addEventListener('click', function h(e) {
                    if (!menu.contains(e.target) && e.target !== textarea) {
                        menu.remove();
                        document.removeEventListener('click', h);
                        document.removeEventListener('keydown', keyHandler);
                    }
                });
            }, 50);

            document.body.appendChild(menu);
        };

        window.ocShowAtSubForm = function(type, textarea, menu, bg, bd, tx, tx2) {
            // Clear menu content, show sub-form
            menu.innerHTML = '';
            menu.style.padding = '12px';

            var title = {file:'\uD83D\uDCC4 File path', folder:'\uD83D\uDCC1 Directory', web:'\uD83C\uDF10 Web URL'}[type];
            var placeholder = {file:'/path/to/file.py', folder:'/path/to/project', web:'https://example.com/page'}[type];

            var label = document.createElement('div');
            label.style.cssText = 'font-size:0.8rem;font-weight:600;color:'+tx2+';margin-bottom:8px;';
            label.textContent = title;
            menu.appendChild(label);

            var inputStyle = 'width:100%;padding:8px 10px;background:'+(document.documentElement.getAttribute('data-theme')!=='light'?'#2a2a2a':'#f5f5f5')+';border:1px solid '+bd+';border-radius:8px;color:'+tx+';font-size:0.875rem;font-family:inherit;outline:none;box-sizing:border-box;';

            var inp1 = document.createElement('input');
            inp1.type='text'; inp1.placeholder=placeholder; inp1.style.cssText=inputStyle+'margin-bottom:8px;';
            inp1.onfocus=function(){this.style.borderColor='#10a37f';};
            inp1.onblur=function(){this.style.borderColor=bd;};
            menu.appendChild(inp1);

            var inp2 = null;
            if (type === 'folder') {
                var row2 = document.createElement('div');
                row2.style.cssText = 'display:flex;gap:6px;margin-bottom:8px;';
                inp2 = document.createElement('input');
                inp2.type='text'; inp2.placeholder='ext (e.g. py)'; inp2.style.cssText=inputStyle.replace('margin-bottom:8px;','')+'flex:1;';
                inp2.onfocus=function(){this.style.borderColor='#10a37f';};
                inp2.onblur=function(){this.style.borderColor=bd;};
                var inp3 = document.createElement('input');
                inp3.type='number'; inp3.placeholder='depth'; inp3.value='1'; inp3.min='1'; inp3.max='5';
                inp3.style.cssText=inputStyle.replace('margin-bottom:8px;','')+'width:70px;';
                inp3.onfocus=function(){this.style.borderColor='#10a37f';};
                inp3.onblur=function(){this.style.borderColor=bd;};
                row2.appendChild(inp2);
                row2.appendChild(inp3);
                menu.appendChild(row2);
                // store depth ref
                inp2._depth = inp3;
            }

            var btnRow = document.createElement('div');
            btnRow.style.cssText = 'display:flex;gap:6px;';

            var addBtn = document.createElement('button');
            addBtn.type='button'; addBtn.textContent='Add to context';
            addBtn.style.cssText='flex:1;padding:7px 12px;border-radius:8px;border:none;background:#10a37f;color:white;font-size:0.875rem;font-weight:500;cursor:pointer;font-family:inherit;';
            addBtn.onmouseover=function(){this.style.background='#0a7a5e';};
            addBtn.onmouseout=function(){this.style.background='#10a37f';};
            addBtn.onclick = function() {
                var path = inp1.value.trim();
                if (!path) { inp1.focus(); return; }

                // Remove @ from textarea
                var v = textarea.value, p = textarea.selectionStart;
                var atIdx = v.lastIndexOf('@', p-1);
                if (atIdx >= 0) {
                    textarea.value = v.substring(0, atIdx) + v.substring(p);
                    textarea.selectionStart = textarea.selectionEnd = atIdx;
                }
                menu.remove();
                textarea.focus();

                if (type === 'file') {
                    // @File: still uses server-side /file command
                    ocAddMentionChip('\uD83D\uDCC4', path.split('/').pop(), {kind:'cmd', text:'/file '+path});
                } else if (type === 'folder') {
                    // @Folder: call readDirectory API
                    var ext = inp2 ? inp2.value.trim() : '';
                    var depth = inp2 ? parseInt(inp2._depth.value)||1 : 1;
                    var label2 = path.split('/').pop() + (ext?' (*.'+ext+')':'');
                    var chipId = 'mc-' + Date.now();
                    ocAddMentionChip('\uD83D\uDCC1', label2, {kind:'loading', id:chipId});
                    var body = {path:path, depth:depth};
                    if (ext) body.ext = ext;
                    fetch('readDirectory', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
                        .then(function(r){return r.json();})
                        .then(function(d){
                            var item = ocMentionItems.find(function(i){return i._id===chipId;});
                            if (item && d.content) { item.kind='content'; item.text=d.content; }
                            else if (item && d.error) { ocRemoveMentionChip(null, chipId); alert('Error reading directory: '+(d.message||d.error)); }
                        }).catch(function(){
                            var item = ocMentionItems.find(function(i){return i._id===chipId;});
                            if (item) ocRemoveMentionChip(null, chipId);
                            alert('Failed to read directory.');
                        });
                } else {
                    // @Web URL: call fetchUrl API
                    var hostname = path;
                    try { hostname = new URL(path).hostname; } catch(e){}
                    var chipId2 = 'mc-' + Date.now();
                    ocAddMentionChip('\uD83C\uDF10', hostname, {kind:'loading', id:chipId2});
                    fetch('fetchUrl', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:path})})
                        .then(function(r){return r.json();})
                        .then(function(d){
                            var item = ocMentionItems.find(function(i){return i._id===chipId2;});
                            if (item && d.content) { item.kind='content'; item.text=d.content; }
                            else if (item && d.error) { ocRemoveMentionChip(null, chipId2); alert('Error fetching URL: '+(d.message||d.error)); }
                        }).catch(function(){
                            var item = ocMentionItems.find(function(i){return i._id===chipId2;});
                            if (item) ocRemoveMentionChip(null, chipId2);
                            alert('Failed to fetch URL.');
                        });
                }
            };

            var cancelBtn = document.createElement('button');
            cancelBtn.type='button'; cancelBtn.textContent='Cancel';
            cancelBtn.style.cssText='padding:7px 12px;border-radius:8px;border:1px solid '+bd+';background:transparent;color:'+tx2+';font-size:0.875rem;cursor:pointer;font-family:inherit;';
            cancelBtn.onclick=function(){ menu.remove(); textarea.focus(); };

            btnRow.appendChild(addBtn);
            btnRow.appendChild(cancelBtn);
            menu.appendChild(btnRow);
            setTimeout(function(){ inp1.focus(); }, 50);
        };

        window.ocShowUrlHint = function(textarea, url) {
            if (document.getElementById('oc-url-hint')) return; // already showing
            var bar = document.querySelector('[data-oc-input-bar]');
            if (!bar) return;
            var dark = document.documentElement.getAttribute('data-theme') !== 'light';
            var hint = document.createElement('div');
            hint.id = 'oc-url-hint';
            hint.style.cssText = 'display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:'+(dark?'rgba(16,163,127,0.12)':'rgba(13,143,110,0.08)')+';border:1px solid '+(dark?'#10a37f':'#0d8f6e')+';border-radius:7px;font-size:0.78rem;color:'+(dark?'#10a37f':'#0d8f6e')+';margin-bottom:6px;cursor:pointer;';
            hint.innerHTML = '\uD83C\uDF10 <span>Add "'+url.substring(0,40)+(url.length>40?'...':'')+'" as @web context</span>';
            hint.onclick = function() {
                // Remove URL from textarea
                textarea.value = textarea.value.replace(url, '').trimEnd();
                hint.remove();
                ocAddMentionChip('\uD83C\uDF10', new URL(url).hostname, '/url ' + url);
                textarea.focus();
            };
            bar.insertBefore(hint, bar.firstChild);
        };

        window.ocAddMentionChip = function(icon, label, data) {
            // data: {kind:'cmd'|'content'|'loading', text, id}
            var id = data.id || ('mc-'+Date.now());
            ocMentionItems.push({icon:icon, label:label, kind:data.kind, text:data.text, _id:id});
            var bar = document.querySelector('[data-oc-input-bar]');
            if (!bar) return;
            var dark = document.documentElement.getAttribute('data-theme') !== 'light';
            var chip = document.createElement('div');
            chip.setAttribute('data-mention-chip', id);
            chip.style.cssText = 'display:inline-flex;align-items:center;gap:6px;padding:4px 10px 4px 8px;background:'+(dark?'#2a2a2a':'#f0f2f5')+';border:1px solid '+(dark?'#3f3f3f':'#c5cdd8')+';border-radius:7px;font-size:0.8rem;color:'+(dark?'#c0c0d0':'#4b5563')+';margin-bottom:6px;margin-right:4px;';
            var loadingSpinner = data.kind==='loading' ? ' <span style="opacity:0.5;font-size:0.7rem;">loading...</span>' : '';
            chip.innerHTML = '<span>'+icon+'</span><span style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+label+'">'+label+'</span>'+loadingSpinner
                +'<button onclick="ocRemoveMentionChip(this,\''+id+'\')" style="background:none;border:none;cursor:pointer;color:inherit;padding:0;font-size:1rem;line-height:1;flex-shrink:0;opacity:0.6;" title="Remove">\u00d7</button>';
            var firstNonChip = Array.from(bar.children).find(function(c) { return !c.hasAttribute('data-mention-chip') && c.id !== 'oc-file-chip' && c.id !== 'oc-url-hint'; });
            if (firstNonChip) bar.insertBefore(chip, firstNonChip);
            else bar.insertBefore(chip, bar.firstChild);
        };

        window.ocRemoveMentionChip = function(btn, id) {
            ocMentionItems = ocMentionItems.filter(function(i){ return i._id !== id; });
            var el = btn ? btn.closest('[data-mention-chip]') : document.querySelector('[data-mention-chip="'+id+'"]');
            if (el) el.remove();
        };

        // Edit conversation title modal
        window.ocEditTitle = function(convId, encodedTitle) {
            var title = decodeURIComponent(encodedTitle);
            var existing = document.querySelector('[data-oc-title-modal]');
            if (existing) existing.remove();
            var dark = document.documentElement.getAttribute('data-theme') !== 'light';
            var bg = dark ? '#1e1e1e' : '#ffffff';
            var iBg = dark ? '#2a2a2a' : '#f0f0f2';
            var tx = dark ? '#ececec' : '#111827';
            var bd = dark ? '#3f3f3f' : '#c5cdd8';
            var modal = document.createElement('div');
            modal.setAttribute('data-oc-title-modal','1');
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;';
            modal.innerHTML = '<div style="background:'+bg+';border:1px solid '+bd+';border-radius:14px;padding:1.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.5);">'
                + '<p style="margin:0 0 0.75rem;font-size:0.95rem;font-weight:600;color:'+tx+';">Edit conversation title</p>'
                + '<input id="oc-ti" type="text" style="width:100%;padding:9px 12px;background:'+iBg+';border:1px solid '+bd+';border-radius:8px;color:'+tx+';font-size:0.9rem;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:1rem;">'
                + '<div style="display:flex;gap:0.5rem;justify-content:flex-end;">'
                + '<button onclick="document.querySelector(\'[data-oc-title-modal]\').remove();" style="padding:7px 14px;border-radius:8px;border:1px solid '+bd+';background:transparent;color:'+(dark?'#c0c0d0':'#4b5563')+';font-size:0.875rem;cursor:pointer;font-family:inherit;">Cancel</button>'
                + '<button id="oc-ts" style="padding:7px 14px;border-radius:8px;border:none;background:#10a37f;color:white;font-size:0.875rem;font-weight:500;cursor:pointer;font-family:inherit;">Update</button>'
                + '</div></div>';
            document.body.appendChild(modal);
            var inp = document.getElementById('oc-ti');
            inp.value = title; inp.focus(); inp.select();
            function save() {
                var v = inp.value.trim(); if (!v) return;
                fetch('setConversationTitle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:convId,title:v})})
                .then(function(){document.querySelector('[data-oc-title-modal]').remove();location.reload();});
            }
            document.getElementById('oc-ts').onclick = save;
            inp.addEventListener('keydown',function(e){if(e.key==='Enter')save();if(e.key==='Escape')modal.remove();});
            modal.addEventListener('click',function(e){if(e.target===modal)modal.remove();});
        };

        // Apply saved theme, font size and sidebar state before render
        (function() {
            const t = localStorage.getItem('oc-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
            const f = localStorage.getItem('oc-font');
            if (f) document.documentElement.style.setProperty('--markdown-model-font-size', f);
            if (localStorage.getItem('oc-sidebar') === 'collapsed') {
                document.documentElement.classList.add('oc-collapsed');
            }
        })();

        // Mermaid diagram rendering
        (function() {
            if (typeof mermaid === 'undefined') return;
            const isDark = localStorage.getItem('oc-theme') !== 'light';
            mermaid.initialize({
                startOnLoad: false,
                theme: isDark ? 'dark' : 'base',
                fontFamily: 'Inter, system-ui, sans-serif',
                fontSize: 14,
                securityLevel: 'loose'
            });

            // Mermaid diagram keyword pattern
            const MERMAID_RE = /^\s*(flowchart|graph\s+[A-Z]+|sequenceDiagram|classDiagram|stateDiagram|erDiagram|gantt|pie|gitGraph|journey|quadrantChart|xychart|block|packet|timeline|mindmap|sankey|zenuml)/i;

            let debounceTimer = null;
            function scheduleRender() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(renderMermaid, 300);
            }

            function isGenerating() {
                // Stop button is only present during active streaming generation
                return !!document.querySelector('button[title="Stop generating"]');
            }

            function renderMermaid() {
                // Skip while streaming — diagram is incomplete, would flicker
                if (isGenerating()) return;

                // 1. Match by class (standard markdown renderers)
                document.querySelectorAll('code.language-mermaid, code.mermaid, pre.language-mermaid, pre.mermaid').forEach(processEl);

                // 2. Fallback: detect by content in ANY code block
                document.querySelectorAll('pre code, pre').forEach(function(el) {
                    var text = (el.textContent || '').trim();
                    if (MERMAID_RE.test(text)) processEl(el);
                });
            }

            function processEl(el) {
                var pre = el.tagName === 'PRE' ? el : (el.closest('pre') || el.parentElement);
                if (!pre) return;
                if (pre.dataset.mermaidDone || pre.closest('[data-mermaid-wrap]')) return;
                pre.dataset.mermaidDone = '1';

                var text = (el.textContent || '').trim();
                if (!text || !MERMAID_RE.test(text)) return;

                var dark = document.documentElement.getAttribute('data-theme') !== 'light';
                var btnCss = 'padding:2px 9px;border-radius:6px;border:1px solid '+(dark?'#3f3f3f':'#c5cdd8')+';background:transparent;color:'+(dark?'#c0c0d0':'#4b5563')+';font-size:0.72rem;cursor:pointer;font-family:inherit;';

                // Outer wrapper
                var wrap = document.createElement('div');
                wrap.setAttribute('data-mermaid-wrap', '1');
                wrap.style.cssText = 'border:1px solid '+(dark?'#3f3f3f':'#c5cdd8')+';border-radius:10px;overflow:hidden;margin:0.5rem 0;';

                // Toolbar
                var toolbar = document.createElement('div');
                toolbar.style.cssText = 'display:flex;justify-content:flex-end;gap:0.35rem;padding:5px 8px;background:'+(dark?'#2a2a2a':'#f0f0f2')+';border-bottom:1px solid '+(dark?'#3f3f3f':'#c5cdd8')+';';

                // Copy button
                var copyBtn = document.createElement('button');
                copyBtn.type = 'button'; copyBtn.textContent = 'Copy'; copyBtn.style.cssText = btnCss;
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(text).then(function() {
                        copyBtn.textContent = '✓ Copied';
                        setTimeout(function() { copyBtn.textContent = 'Copy'; }, 1500);
                    });
                };

                // Toggle button (Graph ↔ Text)
                var showGraph = true;
                var toggleBtn = document.createElement('button');
                toggleBtn.type = 'button'; toggleBtn.textContent = 'Text'; toggleBtn.style.cssText = btnCss;
                toggleBtn.onclick = function() {
                    showGraph = !showGraph;
                    graphArea.style.display = showGraph ? '' : 'none';
                    textArea.style.display = showGraph ? 'none' : '';
                    toggleBtn.textContent = showGraph ? 'Text' : 'Graph';
                };

                toolbar.appendChild(copyBtn);
                toolbar.appendChild(toggleBtn);

                // Graph area
                var graphArea = document.createElement('div');
                graphArea.style.cssText = 'overflow-x:auto;padding:1rem;text-align:center;';
                var mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = text;
                graphArea.appendChild(mermaidDiv);

                // Text area (hidden by default)
                var textArea = document.createElement('pre');
                textArea.style.cssText = 'display:none;margin:0;padding:1rem 1.25rem;overflow-x:auto;font-size:0.85rem;line-height:1.5;';
                var codeEl = document.createElement('code');
                codeEl.textContent = text;
                textArea.appendChild(codeEl);

                wrap.appendChild(toolbar);
                wrap.appendChild(graphArea);
                wrap.appendChild(textArea);
                pre.replaceWith(wrap);

                mermaid.run({ nodes: [mermaidDiv] }).catch(function(e) {
                    console.warn('Mermaid:', e);
                    wrap.replaceWith(pre);
                });
            }

            // Watch DOM changes — also fires when Stop button disappears (generation ends)
            var wasGenerating = false;
            var obs = new MutationObserver(function(muts) {
                var nowGenerating = isGenerating();
                // Trigger render when generation just finished
                if (wasGenerating && !nowGenerating) {
                    setTimeout(renderMermaid, 100);
                }
                wasGenerating = nowGenerating;
                // Also schedule on new nodes (but skip if currently generating)
                if (!nowGenerating) {
                    for (var i = 0; i < muts.length; i++) {
                        if (muts[i].addedNodes.length) { scheduleRender(); return; }
                    }
                }
            });
            obs.observe(document.documentElement, { childList: true, subtree: true });

            // Initial render attempts
            setTimeout(renderMermaid, 300);
            setTimeout(renderMermaid, 1000);
        })();

        // Code block copy buttons
        (function() {
            function copyText(text, btn) {
                function done() {
                    btn.textContent = '✓ Copied';
                    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
                }
                function fallback() {
                    var ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
                    document.body.appendChild(ta);
                    ta.focus(); ta.select();
                    try { document.execCommand('copy'); done(); } catch(e) {}
                    document.body.removeChild(ta);
                }
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(done).catch(fallback);
                } else {
                    fallback();
                }
            }
            function addCopyButtons() {
                document.querySelectorAll('pre').forEach(function(pre) {
                    if (pre.dataset.copyDone || pre.dataset.mermaidDone || pre.closest('[data-mermaid-wrap]')) return;
                    var codeEl = pre.querySelector('code');
                    var text = (codeEl ? codeEl.textContent : pre.textContent || '').trim();
                    if (!text) return;
                    pre.dataset.copyDone = '1';
                    var dark = document.documentElement.getAttribute('data-theme') !== 'light';
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'oc-copy-btn';
                    btn.textContent = 'Copy';
                    btn.style.cssText = 'border:1px solid ' + (dark ? '#3f3f3f' : '#c5cdd8') + ';background:' + (dark ? '#1e1e1e' : '#fff') + ';color:' + (dark ? '#c0c0d0' : '#4b5563') + ';';
                    btn.onclick = function() { copyText(text, btn); };
                    pre.appendChild(btn);
                });
            }
            var copyObs = new MutationObserver(function(muts) {
                for (var i = 0; i < muts.length; i++) {
                    if (muts[i].addedNodes.length) { setTimeout(addCopyButtons, 80); return; }
                }
            });
            copyObs.observe(document.documentElement, { childList: true, subtree: true });
            setTimeout(addCopyButtons, 300);
        })();

        import {MarkdownUp} from './markdown-up/lib/app.js';
        const app = new MarkdownUp(window, {
            'systemPrefix': './markdown-up/include/',
            'markdownText': `\
~~~ markdown-script
include 'ollamaChat.bare'

ollamaChatMain()
~~~
`
        });
        app.run();
    </script>
